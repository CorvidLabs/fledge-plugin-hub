<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fledge hub</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="sidebar">
    <div class="logo">
      <span class="logo-icon">🪶</span>
      <span class="logo-text">fledge hub</span>
    </div>
    <ul class="nav-links">
      <li class="nav-section">Project</li>
      <li><a href="#" class="nav-link active" data-page="project">Overview</a></li>
      <li class="nav-section">Global</li>
      <li><a href="#" class="nav-link" data-page="store">Store</a></li>
      <li><a href="#" class="nav-link" data-page="installed">Installed</a></li>
      <li><a href="#" class="nav-link" data-page="lanes">Lanes</a></li>
      <li><a href="#" class="nav-link" data-page="config">Config</a></li>
      <li><a href="#" class="nav-link" data-page="doctor">Doctor</a></li>
    </ul>
    <div class="sidebar-footer">
      <span class="version" id="fledge-version">loading...</span>
    </div>
  </nav>

  <main class="content">
    <!-- Project overview -->
    <div id="page-project" class="page active">
      <div id="project-header"></div>
      <div id="project-content"></div>
    </div>

    <!-- Store / Browse -->
    <div id="page-store" class="page">
      <h1>Browse Packages</h1>
      <div class="toolbar">
        <input type="text" id="store-search" placeholder="Search fledge plugins and templates..." class="search-input">
        <button id="store-search-btn" class="btn">Search</button>
      </div>
      <div class="category-tabs">
        <button class="tab active" data-category="all">All</button>
        <button class="tab" data-category="plugins">Plugins</button>
        <button class="tab" data-category="templates">Templates</button>
      </div>
      <div id="store-grid" class="store-grid">
        <div class="loading">Loading packages from GitHub...</div>
      </div>
    </div>

    <!-- Installed -->
    <div id="page-installed" class="page">
      <h1>Installed</h1>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-tabs">
        <button class="section-tab active" data-section="plugins">Plugins</button>
        <button class="section-tab" data-section="templates">Templates</button>
        <button class="section-tab" data-section="commands">Commands</button>
      </div>
      <div id="installed-plugins" class="installed-section active">
        <div id="installed-plugins-list" class="item-grid"></div>
      </div>
      <div id="installed-templates" class="installed-section">
        <div id="installed-templates-list" class="item-grid"></div>
      </div>
      <div id="installed-commands" class="installed-section">
        <div id="command-tree" class="command-tree"></div>
      </div>
    </div>

    <!-- Lanes -->
    <div id="page-lanes" class="page">
      <h1>Lanes</h1>
      <div id="lanes-list" class="lanes-list"></div>
    </div>

    <!-- Config -->
    <div id="page-config" class="page">
      <h1>Config</h1>
      <div id="config-list" class="config-list"></div>
    </div>

    <!-- Doctor -->
    <div id="page-doctor" class="page">
      <h1>Doctor</h1>
      <div class="card">
        <pre id="doctor-output" class="terminal-output"></pre>
      </div>
    </div>

    <!-- Readme modal -->
    <div id="readme-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content card">
        <div class="modal-header">
          <h2 id="readme-title"></h2>
          <button class="modal-close">&times;</button>
        </div>
        <div id="readme-body" class="readme-body"></div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
