name: CI

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - bin/**
      - package.json
      - bun.lock
      - tsconfig.json
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - bin/**
      - package.json
      - bun.lock
      - tsconfig.json
      - .github/workflows/ci.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun test

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck
        run: |
          shopt -s nullglob
          fail=0
          for f in bin/*; do
            if head -n1 "$f" | grep -qE '^#!.*\b(bash|sh)\b'; then
              echo "▶ shellcheck $f"
              shellcheck "$f" || fail=1
            fi
          done
          exit "$fail"
